spring.application.name=proxora

# Render asigna el puerto dinámicamente via $PORT; el valor por defecto es 8080 para local
server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

app.admin.correo=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.leak-detection-threshold=2000
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# AWS S3
AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
AWS_SECRET_KEY=${AWS_SECRET_KEY}
AWS_REGION=${AWS_REGION}
AWS_BUCKET_NAME=${AWS_BUCKET_NAME}

# Multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Mail - AWS SES (HTTP, compatible con Render)
app.mail.remitente=${MAIL_SENDER}
